services:
  backend:
    image: lost-and-found-backend:latest
    ports:
      - "3000:3000"
    volumes:
      - ./backend/lost_and_found.sqlite:/app/lost_and_found.sqlite
    restart: unless-stopped

  frontend:
    image: lost-and-found-frontend:latest
    ports:
      - "80:3000"
    depends_on:
      - backend
    restart: unless-stopped
