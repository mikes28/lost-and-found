version: '3.8'

services:
  backend:
    image: node:22-bullseye-slim
    working_dir: /app
    volumes:
      - ./backend:/app:delegated
      - ./backend/lost_and_found.sqlite:/app/lost_and_found.sqlite
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm start"
    ports:
      - "3000:3000"
    restart: unless-stopped
